<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Jira Daily Reporter — Slack OAuth</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; max-width: 640px; margin: 4rem auto; padding: 0 1rem; line-height: 1.5; color: #1f2328; }
    code { background: #f6f8fa; padding: 0.2rem 0.4rem; border-radius: 4px; font-size: 0.95em; word-break: break-all; }
    .code-block { background: #f6f8fa; padding: 1rem; border-radius: 6px; word-break: break-all; }
    button { padding: 0.5rem 1rem; font-size: 1rem; border: 1px solid #d0d7de; background: #f6f8fa; border-radius: 6px; cursor: pointer; }
    button:hover { background: #eaeef2; }
    .ok { color: #1a7f37; }
    .err { color: #cf222e; }
  </style>
</head>
<body>
  <h1>Jira Daily Reporter</h1>
  <p>You authorized the Slack app. Copy the code below and paste it into the CLI:</p>
  <pre class="code-block" id="code">(reading…)</pre>
  <p>
    <button id="copy">Copy code</button>
    <span id="status"></span>
  </p>
  <p>Then in your terminal run:</p>
  <pre class="code-block">jira-daily-report login --code &lt;paste-here&gt;</pre>
  <script>
    const params = new URLSearchParams(location.search);
    const code = params.get("code");
    const error = params.get("error");
    const codeEl = document.getElementById("code");
    const statusEl = document.getElementById("status");
    if (error) {
      codeEl.textContent = "Error from Slack: " + error;
      codeEl.classList.add("err");
    } else if (code) {
      codeEl.textContent = code;
    } else {
      codeEl.textContent = "(no code in URL — open this page through Slack's install link)";
    }
    document.getElementById("copy").addEventListener("click", async () => {
      if (!code) return;
      try {
        await navigator.clipboard.writeText(code);
        statusEl.textContent = "Copied!";
        statusEl.className = "ok";
      } catch (e) {
        statusEl.textContent = "Copy failed — select the code and Cmd+C";
        statusEl.className = "err";
      }
    });
  </script>
</body>
</html>
